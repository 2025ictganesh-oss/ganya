<!DOCTYPE html>
<html>
<head>
<title>MET IT Practicals</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

nav a:hover{
background:#005edb;
transform:scale(1.05);
}

.item{
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.form-container {
    display: flex;
    justify-content: center;
    margin: 40px 0;
}

form {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    text-align: center;
}

form input, form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
}

form textarea {
    height: 80px;
}

form button {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    background: linear-gradient(45deg,#0077ff,#00c6ff);
    color: white;
    border:none;
}

body{
background: url("bg.avif") no-repeat center center fixed;
background-size: cover;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:linear-gradient(90deg,#0077ff,#00c6ff);
flex-wrap:wrap;
text-align:center;
}

.logo3d{
font-size:28px;
font-weight:700;
color:white;
}

.highlight{color:white;}

nav{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

nav a{
color:white;
padding:8px 16px;
border-radius:20px;
text-decoration:none;
background:#0077ff;
}

.search-box{text-align:center;margin:20px;}
.search-box input{
padding:10px;
width:90%;
max-width:500px;
border-radius:20px;
border:none;
}

.rows{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:15px;
padding:20px;
}

.item{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.done{
border:2px solid green;
}

.btns{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.btns a{
padding:6px 10px;
border-radius:6px;
color:white;
text-decoration:none;
}

.code{background:#0077ff;}
.output{background:#ff4081;}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup iframe{
width:90%;
height:80%;
background:white;
}

.popup:target{display:flex;}

footer{
text-align:center;
padding:10px;
background:#0077ff;
color:white;
}

@media(max-width:768px){
.logo3d{font-size:22px;}
header{padding:15px;}
}
</style>
</head>

<body>

<header>
<div>
<h1 class="logo3d">MET Bhujbal Knowledge City</h1>
<p class="highlight">IT DIPLOMA FYIF</p>
</div>

<nav>
<a href="#">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="https://www.instagram.com/ganya_.0123/" target="_blank">Insta</a>
</nav>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search Practical...">
</div>

<div style="text-align:center; color:white;">
<p>List Of Practicals</p>
</div>

<div class="rows" id="list">
<script>
for (let i = 1; i <= 25; i++) {
document.write(`
<div class="item" onclick="markDone(this)">
<h3>Practical ${i}</h3>
<div class="btns">
<a href="Pr${i}.txt" class="code">Code</a>
<a href="#img${i}" class="output">Output</a>
</div>
</div>
`);
}
</script>
</div>

<script>
for (let i = 1; i <= 25; i++) {
document.write(`
<div id="img${i}" class="popup">
<iframe src="Pr${i}.html"></iframe>
</div>
`);
}
</script>

<div class="form-container">
<form id="feedbackForm" action="https://script.google.com/macros/s/AKfycbyyhdWTRcX_UkfRes7TrDGbNsCntSUMuqGAPX6qVTfdSw5USSRvc7eml33kfD3dtVVm/exec">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send</button>

</form>
</div>

<footer>
<p>© 2026 MET LEAGUE OF COLLAGES</p>
</footer>

<script>

const form = document.getElementById("feedbackForm");

form.addEventListener("submit", function(e){
e.preventDefault();

fetch(form.action, {
method: "POST",
body: new FormData(form)
})
.then(() => {
alert("✅ Message Sent Successfully!");
form.reset();
})
.catch((err) => {
console.log(err);
alert("❌ Error sending message");
});

});

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function () {
let value = this.value.toLowerCase();
let items = document.querySelectorAll(".item");

items.forEach(item => {
item.style.display = item.innerText.toLowerCase().includes(value) ? "block" : "none";
});
});

/* MARK DONE */
function markDone(el) {
el.classList.toggle("done");
}

</script>

</body>
</html>
